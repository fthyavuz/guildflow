<div class="login-container">
    <div class="glow-orb"></div>

    <div class="glass-card login-card fade-in">
        <div class="card-header">
            <h1 class="grad-text">GuildFlow</h1>
            <p class="subtitle">Elevate Your Potential</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" formControlName="email" class="form-input" placeholder="your@email.com"
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" class="form-input"
                    placeholder="••••••••" autocomplete="current-password">
            </div>

            <div *ngIf="error" class="error-msg">
                {{ error }}
            </div>

            <button type="submit" class="btn btn-primary login-btn" [disabled]="loading || loginForm.invalid">
                <span *ngIf="!loading">Unlock Platform</span>
                <span *ngIf="loading" class="spinner"></span>
            </button>
        </form>

        <div class="card-footer">
            <p>New to the Guild? <a routerLink="/register">Inquire for Membership</a></p>
        </div>
    </div>
</div>
