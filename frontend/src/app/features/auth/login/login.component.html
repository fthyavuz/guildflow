<div class="login-container">
    <div class="glow-orb"></div>

    <!-- Language Switcher (top-right) -->
    <div class="lang-switcher-top">
        <button (click)="themeService.toggleTheme()" class="theme-btn-mini" [title]="'Change Theme'">
            <svg *ngIf="themeService.currentTheme() === 'dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" class="theme-icon">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg *ngIf="themeService.currentTheme() === 'light'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" class="theme-icon">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <div class="sep"></div>
        <button *ngFor="let lang of languageService.supportedLanguages" class="lang-btn"
            [class.active]="languageService.currentLanguage() === lang.code" (click)="setLanguage(lang.code)"
            [id]="'login-lang-' + lang.code">
            <span>{{ lang.flag }}</span>
            <span>{{ lang.code | uppercase }}</span>
        </button>
    </div>

    <div class="glass-card login-card fade-in">
        <div class="card-header">
            <h1 class="grad-text">GuildFlow</h1>
            <p class="subtitle">{{ 'AUTH.SUBTITLE' | translate }}</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="form-group">
                <label for="email">{{ 'AUTH.EMAIL' | translate }}</label>
                <input type="email" id="email" formControlName="email" class="form-input"
                    [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
                <input type="password" id="password" formControlName="password" class="form-input"
                    placeholder="••••••••" autocomplete="current-password">
            </div>

            <div *ngIf="error" class="error-msg">
                {{ error }}
            </div>

            <button type="submit" class="btn btn-primary login-btn" [disabled]="loading || loginForm.invalid">
                <span *ngIf="!loading">{{ 'AUTH.SIGN_IN' | translate }}</span>
                <span *ngIf="loading" class="spinner"></span>
            </button>
        </form>

        <div class="card-footer">
            <p>{{ 'AUTH.NEW_MEMBER' | translate }} <a routerLink="/register">{{ 'AUTH.JOIN_LINK' | translate }}</a></p>
        </div>
    </div>
</div>
