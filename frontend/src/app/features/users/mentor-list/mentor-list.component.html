<div class="page-container fade-in">
    <div class="nav-header">
        <a routerLink="/dashboard" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            {{ 'COMMON.BACK_TO_DASHBOARD' | translate }}
        </a>
    </div>
    <header class="page-header">
        <div class="header-content">
            <h1 class="grad-text">Mentors</h1>
            <p class="subtitle">Manage the guild's wise instructors</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" routerLink="/mentors/new">+ Create Mentor</button>
        </div>
    </header>

    <div class="class-grid" *ngIf="mentors$ | async as mentors; else loading">
        <div class="glass-card class-card" *ngFor="let mentor of mentors">
            <div class="card-glow"></div>

            <div class="card-top">
                <span class="level-badge">Mentor</span>
            </div>

            <div class="card-content">
                <h3>{{ mentor.firstName }} {{ mentor.lastName }}</h3>
                <p>{{ mentor.email }}</p>
            </div>
            <div class="card-footer">
                <div class="footer-left">
                    <span class="instructor">ID: {{ mentor.id }}</span>
                </div>
                <div class="footer-actions">
                    <button class="view-btn" [routerLink]="['/mentors/edit', mentor.id]">
                        Manage
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <polyline points="12 5 19 12 12 19" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state glass" *ngIf="mentors.length === 0">
            <div class="icon">🧙‍♂️</div>
            <h3>No Mentors Found</h3>
            <p>You haven't added any mentors to the system.</p>
        </div>
    </div>

    <ng-template #loading>
        <div class="loader-container">
            <div class="spinner large"></div>
            <p>Summoning mentors...</p>
        </div>
    </ng-template>
</div>
