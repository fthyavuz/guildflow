# ========================
# GuildFlow Backend Config
# ========================

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/guildflow
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=guildflow-secret-key-change-this-in-production-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Logging
logging.level.com.guildflow=DEBUG
logging.level.org.springframework.security=DEBUG
