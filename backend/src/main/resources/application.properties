# ========================
# GuildFlow Backend Config
# ========================
# This is the base configuration shared across all environments.
# Secrets are read from environment variables — never hardcode them here.
# Profile-specific overrides live in application-dev.properties / application-prod.properties.

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:guildflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
# In production: set the APP_JWT_SECRET environment variable (min 32 characters / 256 bits).
# In development: application-dev.properties provides a local fallback value.
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Seed Data — disabled by default; enabled only in application-dev.properties
app.seed-data.enabled=false

# CORS — comma-separated list of allowed origins.
# Override via APP_CORS_ORIGINS env var or in profile-specific properties.
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:4200}
