# ========================
# Dev Profile Config
# ========================
# Activated via: -Dspring.profiles.active=dev  (or SPRING_PROFILES_ACTIVE=dev env var)
# Provides safe local defaults so the app starts without any environment variables set.

# JWT — local dev secret only, never use in production
app.jwt.secret=guildflow-dev-only-secret-key-not-for-production-must-be-256-bits-long-hs256

# JPA — verbose query logging in dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging — verbose in dev
logging.level.com.guildflow=DEBUG
logging.level.org.springframework.security=DEBUG

# Seed Data — enabled in dev so the app starts with usable test data
app.seed-data.enabled=true
