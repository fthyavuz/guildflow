# ========================
# Prod Profile Config
# ========================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# APP_JWT_SECRET environment variable MUST be set — startup will fail without it.

# JPA — no SQL logging in production
spring.jpa.show-sql=false

# Logging — minimal in production
logging.level.com.guildflow=INFO
logging.level.org.springframework.security=WARN

# Seed Data — never seed test data in production
app.seed-data.enabled=false
