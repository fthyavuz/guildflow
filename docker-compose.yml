version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: guildflow-db
    environment:
      POSTGRES_DB: guildflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - guildflow_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  guildflow_pgdata:
